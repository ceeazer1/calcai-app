workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: CalcAI
    
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
      
      - name: Create certificate and profiles
        script: |
          set -e  # fail fast on any error
          
          # Verify env var exists
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY not set!"
            echo "Add it in Codemagic > Environment variables > group: app_store_credentials"
            exit 1
          fi
          
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          echo "Key written ($(wc -c < /tmp/cert_key.pem) bytes)"
          
          # Revoke ALL existing distribution certs so only ours remains
          echo "Revoking any existing distribution certificates..."
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save || true
          
          # Create fresh certificate with our persistent key
          echo "Creating distribution certificate..."
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/cert_key.pem \
            --save || echo "Certificate may already exist for this key"
          
          # Force-create provisioning profile
          echo "Fetching/creating provisioning profile..."
          app-store-connect fetch-signing-files "com.calcai.calcaiApp" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          
          echo "Signing setup complete"
      
      - name: Set up keychain and profiles
        script: |
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Get packages
        script: |
          flutter packages pub get
      
      - name: Build iOS
        script: |
          xcode-project use-profiles
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
