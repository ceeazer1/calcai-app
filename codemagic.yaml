workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: CalcAI
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
      
      - name: Create certificate and fetch signing files
        script: |
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save
          app-store-connect fetch-signing-files "com.calcai.calcaiApp" \
            --type IOS_APP_STORE \
            --create
      
      - name: Set up signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
