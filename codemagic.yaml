workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: CalcAI
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
      
      - name: Generate key and create certificate
        script: |
          # Generate a new RSA private key for certificate signing
          openssl genrsa -out $HOME/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat $HOME/cert_key.pem)
          
          # Create iOS distribution certificate
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:$HOME/cert_key.pem \
            --save
          
          # Fetch/create provisioning profile
          app-store-connect fetch-signing-files "com.calcai.calcaiApp" \
            --type IOS_APP_STORE \
            --certificate-key @file:$HOME/cert_key.pem \
            --create
      
      - name: Set up signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
