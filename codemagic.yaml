workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: CalcAI
    
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
      
      - name: Create certificate and profiles
        script: |
          # Use the persistent key saved in Codemagic env vars
          echo "$CERTIFICATE_PRIVATE_KEY" > $CM_BUILD_DIR/cert_key.pem
          
          # Create certificate (skip if already exists from previous build)
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:$CM_BUILD_DIR/cert_key.pem \
            --save || echo "Certificate exists, reusing"
          
          # Fetch or create provisioning profile with matching certificate
          app-store-connect fetch-signing-files "com.calcai.calcaiApp" \
            --type IOS_APP_STORE \
            --certificate-key @file:$CM_BUILD_DIR/cert_key.pem \
            --create
      
      - name: Set up keychain and profiles
        script: |
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Get packages
        script: |
          flutter packages pub get
      
      - name: Build iOS
        script: |
          # Re-apply profiles in case flutter pub get regenerated xcode settings
          xcode-project use-profiles
          
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
