workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: CalcAI
    
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
      
      - name: Create certificate and profiles
        script: |
          openssl genrsa -out $CM_BUILD_DIR/cert_key.pem 2048
          
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:$CM_BUILD_DIR/cert_key.pem \
            --save || true
          
          app-store-connect fetch-signing-files "com.calcai.calcaiApp" \
            --type IOS_APP_STORE \
            --certificate-key @file:$CM_BUILD_DIR/cert_key.pem \
            --create
      
      - name: Set up keychain and profiles
        script: |
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Build iOS
        script: |
          flutter clean
          flutter packages pub get
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
