name: calcai_app
description: CalcAI - ESP32 WiFi Provisioning App
publish_to: 'none'
version: 1.0.0+53

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.2
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.2.4
  http: ^1.2.2
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  sign_in_with_apple: ^8.1.0
  google_sign_in: ^6.2.2
  crypto: ^3.0.6
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# App icon generation. Put your 1024x1024 logo at the image_path below, then
# run:  dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  ios: true
  android: false
  remove_alpha_ios: true        # iOS icons must be opaque (no transparency)
  background_color_ios: "#FFFFFF"  # fill behind a transparent logo — change to taste

flutter:
  uses-material-design: true
